<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#fbf7f2" />
  <title>Wedding Invitation</title>
  <meta name="description" content="Mobile wedding invitation" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="GyeongGuk & MiYeong Wedding Invitation" />
  <meta property="og:description" content="2026.08.23 AM 11:00 Western Benivis Sindorim" />
  <meta property="og:url" content="https://guk222.github.io/wedding-invitation/" />
  <meta property="og:image" content="https://guk222.github.io/wedding-invitation/assets/share-cover.jpg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="GyeongGuk & MiYeong Wedding Invitation" />
  <meta name="twitter:description" content="2026.08.23 AM 11:00 Western Benivis Sindorim" />
  <meta name="twitter:image" content="https://guk222.github.io/wedding-invitation/assets/share-cover.jpg" />
  <link rel="preload" as="image" href="assets/final3-page-01.webp?v=8" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <audio id="bgMusic" src="assets/wedding-music.mp3" loop preload="none"></audio>

  <div class="loading-screen" id="loadingScreen" aria-live="polite">
    <div class="loading-mark"></div>
    <p>Loading invitation</p>
  </div>

  <div class="music-gate" id="musicGate">
    <button type="button" id="startInvite">
      <span>Open Invitation</span>
      <small>Tap to play music</small>
    </button>
  </div>

  <button class="music-toggle" id="musicToggle" type="button" aria-label="Toggle background music">
    <span></span>
    <b>Music</b>
  </button>

  <main class="invite" aria-label="Mobile wedding invitation">
    <section class="sheet"><picture><source srcset="assets/final3-page-01.webp?v=8" type="image/webp" /><img src="assets/final3-page-01.png?v=8" width="1086" height="1448" fetchpriority="high" decoding="async" alt="Invitation page 1" /></picture></section>
    <section class="sheet"><picture><source srcset="assets/final3-page-02.webp?v=8" type="image/webp" /><img src="assets/final3-page-02.png?v=8" width="1086" height="1448" loading="lazy" decoding="async" alt="Invitation page 2" /></picture></section>
    <section class="sheet"><picture><source srcset="assets/final3-page-03.webp?v=8" type="image/webp" /><img src="assets/final3-page-03.png?v=8" width="1086" height="1448" loading="lazy" decoding="async" alt="Invitation page 3" /></picture></section>
    <section class="sheet"><picture><source srcset="assets/final3-page-04.webp?v=8" type="image/webp" /><img src="assets/final3-page-04.png?v=8" width="1086" height="1448" loading="lazy" decoding="async" alt="Invitation page 4" /></picture></section>
    <section class="sheet"><picture><source srcset="assets/final3-page-05.webp?v=8" type="image/webp" /><img src="assets/final3-page-05.png?v=8" width="1085" height="1450" loading="lazy" decoding="async" alt="Invitation page 5" /></picture></section>
    <section class="sheet"><picture><source srcset="assets/final3-page-06.webp?v=8" type="image/webp" /><img src="assets/final3-page-06.png?v=8" width="1092" height="1440" loading="lazy" decoding="async" alt="Invitation page 6" /></picture></section>
    <section class="sheet"><picture><source srcset="assets/final3-page-07.webp?v=8" type="image/webp" /><img src="assets/final3-page-07.png?v=8" width="1086" height="1448" loading="lazy" decoding="async" alt="Invitation page 7" /></picture></section>
    <section class="sheet"><picture><source srcset="assets/final3-page-08.webp?v=8" type="image/webp" /><img src="assets/final3-page-08.png?v=8" width="1086" height="1449" loading="lazy" decoding="async" alt="Invitation page 8" /></picture></section>
    <section class="sheet location-sheet">
      <picture><source srcset="assets/final3-page-09.webp?v=8" type="image/webp" /><img src="assets/final3-page-09.png?v=8" width="1086" height="1448" loading="lazy" decoding="async" alt="Invitation page 9" /></picture>
      <div class="map-actions">
        <a href="https://map.naver.com/p/search/%EC%9B%A8%EC%8A%A4%ED%84%B4%EB%B2%A0%EB%8B%88%EB%B9%84%EC%8A%A4%20%EC%8B%A0%EB%8F%84%EB%A6%BC%EC%A0%90" target="_blank" rel="noreferrer">Naver Map</a>
        <a href="https://map.kakao.com/link/search/%EC%9B%A8%EC%8A%A4%ED%84%B4%EB%B2%A0%EB%8B%88%EB%B9%84%EC%8A%A4%20%EC%8B%A0%EB%8F%84%EB%A6%BC%EC%A0%90" target="_blank" rel="noreferrer">Kakao Map</a>
        <button type="button" id="copyAddress">Copy Address</button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
